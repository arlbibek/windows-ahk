name: Build and Publish Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "release") {
            $version = "${{ github.event.release.tag_name }}"
          } else {
            $version = (Get-Content version.txt -Raw).Trim()
          }
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Version could not be resolved."
          }
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Install AutoHotkey
        shell: pwsh
        run: winget install --id AutoHotkey.AutoHotkey -e --silent --accept-package-agreements --accept-source-agreements

      - name: Download Ahk2Exe compiler (deterministic)
        shell: pwsh
        run: |
          $toolsDir = "$env:RUNNER_TEMP\ahk-tools"
          New-Item -Path $toolsDir -ItemType Directory -Force | Out-Null
          $zipPath = "$toolsDir\Ahk2Exe.zip"
          Invoke-WebRequest -Uri "https://github.com/AutoHotkey/Ahk2Exe/releases/latest/download/Ahk2Exe.zip" -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $toolsDir -Force
          $exe = Get-ChildItem -Path $toolsDir -Filter "Ahk2Exe.exe" -Recurse | Select-Object -First 1
          if (-not $exe) { throw "Ahk2Exe.exe not found in downloaded tools." }
          "AHK2EXE_PATH=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Resolved Ahk2Exe: $($exe.FullName)"

      - name: Verify Ahk2Exe discovery
        shell: pwsh
        run: |
          Write-Host "AHK2EXE_PATH from env: $env:AHK2EXE_PATH"
          if ([string]::IsNullOrWhiteSpace($env:AHK2EXE_PATH)) { throw "AHK2EXE_PATH is empty." }
          if (-not (Test-Path $env:AHK2EXE_PATH)) { throw "AHK2EXE_PATH does not exist: $env:AHK2EXE_PATH" }
          & "$env:AHK2EXE_PATH" /?

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y

      - name: Build exe and installer
        shell: pwsh
        run: .\scripts\build-release.ps1 -Version "${{ steps.version.outputs.value }}"

      - name: Generate checksums
        shell: pwsh
        run: |
          Get-FileHash ".\dist\WINDOWS_AHK.exe" -Algorithm SHA256 | ForEach-Object { "$($_.Hash)  WINDOWS_AHK.exe" } | Out-File ".\dist\checksums.txt"
          $setupFile = Get-ChildItem ".\installer\Output\windows-ahk-setup-*.exe" | Select-Object -First 1
          Get-FileHash $setupFile.FullName -Algorithm SHA256 | ForEach-Object { "$($_.Hash)  $($setupFile.Name)" } | Add-Content ".\dist\checksums.txt"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-ahk-release-assets
          path: |
            dist/WINDOWS_AHK.exe
            dist/checksums.txt
            installer/Output/windows-ahk-setup-*.exe

      - name: Attach assets to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/WINDOWS_AHK.exe
            dist/checksums.txt
            installer/Output/windows-ahk-setup-*.exe
